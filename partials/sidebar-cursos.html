<!--
  Sidebar de cursos próximos.
  Carga `/cursos.json`, filtra estado=abierto, ordena por fechaInicio asc, renderiza cards.
  Mobile (<lg): scroll horizontal con snap arriba del contenido.
  Desktop (lg+): columna lateral derecha sticky.
-->
<style>
  .sidebar-cursos-scroll::-webkit-scrollbar { height: 6px; }
  .sidebar-cursos-scroll::-webkit-scrollbar-track { background: transparent; }
  .sidebar-cursos-scroll::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 3px; }
  @media (min-width: 1024px) {
    .sidebar-cursos-scroll::-webkit-scrollbar { width: 6px; height: 0; }
  }
</style>

<aside class="block lg:sticky lg:top-24" aria-label="Próximos cursos">
  <div class="flex items-baseline justify-between mb-3 px-1 lg:px-0">
    <h2 class="font-serif text-sm font-bold uppercase tracking-wider text-brand-purple">Próximos cursos</h2>
    <a href="https://simacademy.lat" class="text-xs text-gray-400 hover:text-brand-purple transition-colors hidden lg:inline">Ver todos →</a>
  </div>
  <div id="sidebar-cursos-list" class="sidebar-cursos-scroll flex lg:flex-col overflow-x-auto lg:overflow-visible snap-x snap-mandatory lg:snap-none gap-3 pb-2 lg:pb-0 -mx-1 lg:mx-0 px-1 lg:px-0">
    <!-- Cards inyectadas por JS -->
    <div class="text-xs text-gray-400 italic px-2 py-3">Cargando cursos…</div>
  </div>
  <noscript>
    <div class="text-sm text-gray-600 mt-2">
      <p class="mb-2">Cursos próximos en SimAcademy:</p>
      <ul class="space-y-1">
        <li><a class="text-brand-purple underline" href="https://info.simacademy.lat/eusim2/">EuSim Nivel 2 — 30 jul–10 sep 2026</a></li>
        <li><a class="text-brand-purple underline" href="https://info.simacademy.lat/eusim1sep/">EuSim Nivel 1 — 24–26 sep 2026</a></li>
      </ul>
    </div>
  </noscript>
</aside>

<script>
(function(){
  const list = document.getElementById('sidebar-cursos-list');
  if (!list) return;
  fetch('/cursos.json', { cache: 'no-cache' })
    .then(function(r){ return r.ok ? r.json() : Promise.reject(r.status); })
    .then(function(data){
      const today = new Date().toISOString().slice(0,10);
      const cursos = (data.cursos || [])
        .filter(function(c){ return c.estado === 'abierto' && c.fechaInicio >= today; })
        .sort(function(a, b){ return a.fechaInicio.localeCompare(b.fechaInicio); });

      if (cursos.length === 0) {
        list.innerHTML = '<div class="text-xs text-gray-400 italic px-2 py-3">Pronto anunciaremos los próximos cursos.</div>';
        return;
      }

      list.innerHTML = cursos.map(function(c){
        return '' +
          '<a href="' + escapeAttr(c.url) + '" target="_blank" rel="noopener" ' +
          'class="snap-start shrink-0 w-72 lg:w-auto lg:shrink block group bg-white border border-brand-purple/15 rounded-xl p-4 hover:border-brand-purple/40 hover:shadow-md transition-all">' +
            '<span class="inline-block text-[10px] font-bold uppercase tracking-wider text-brand-green bg-brand-green/10 px-2 py-0.5 rounded mb-2">' + escapeHtml(c.eyebrow) + '</span>' +
            '<h3 class="font-serif text-base font-bold text-gray-900 leading-tight mb-1 group-hover:text-brand-purple transition-colors">' + escapeHtml(c.titulo) + '</h3>' +
            '<p class="text-xs text-gray-500 mb-3">' + escapeHtml(c.subtitulo) + '</p>' +
            '<div class="flex items-center gap-1.5 text-xs text-gray-700 font-medium mb-3">' +
              '<svg class="w-3.5 h-3.5 text-brand-purple" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>' +
              escapeHtml(c.fechaTexto) +
            '</div>' +
            '<span class="inline-flex items-center gap-1 text-xs font-semibold text-brand-purple group-hover:gap-2 transition-all">' +
              'Ver curso ' +
              '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>' +
            '</span>' +
          '</a>';
      }).join('');
    })
    .catch(function(){
      list.innerHTML = '<div class="text-xs text-gray-400 italic px-2 py-3">No se pudieron cargar los cursos.</div>';
    });

  function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
  function escapeAttr(s){ return escapeHtml(s); }
})();
</script>
